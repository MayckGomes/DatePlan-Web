<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- Título principal (SEO forte) -->
    <title>DatePlan - Planeje momentos especiais a dois</title>

    <!-- Descrição (muito importante para Google) -->
    <meta name="description" content="DatePlan é um app para casais organizarem compromissos, datas especiais e momentos juntos de forma simples e elegante.">

    <!-- Palavras-chave (menos importante hoje, mas ainda ajuda contexto) -->
    <meta name="keywords" content="DatePlan, app para casais, agenda de casal, compromissos a dois, relacionamento, planejamento de datas">

    <!-- Autor -->
    <meta name="author" content="DatePlan">

    <!-- Canonical (evita conteúdo duplicado) -->
    <link rel="canonical" href="https://dateplanapp.netlify.app">

    <!-- Robots -->
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="DatePlan - Planeje momentos especiais a dois">
    <meta property="og:description" content="Organize compromissos e crie momentos inesquecíveis com quem você ama usando o DatePlan.">
    <meta property="og:url" content="https://dateplanapp.netlify.app">
    <meta property="og:image" content="https://dateplanapp.netlify.app/banner.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DatePlan">
    <meta name="twitter:description" content="Organize momentos especiais a dois de forma simples e bonita.">
    <meta name="twitter:image" content="https://dateplanapp.netlify.app/banner.png">

    <!-- Preload (performance opcional) -->
    <link rel="preload" href="/styles.css" as="style">

    <!-- JSON-LD (SEO avançado - Google entende melhor seu site) -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "DatePlan",
            "applicationCategory": "LifestyleApplication",
            "operatingSystem": "Android, Web",
            "description": "App para casais organizarem compromissos e momentos especiais juntos.",
            "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "BRL"
            }
        }
    </script>

</head>
<body style="text-align: center; align-content: center">

<img src="loading.gif" alt="loading gif">

<script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
